<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FA Web Viewer</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #0f172a;
      --panel-2: #0b1220;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #cbd5e1;
      --accent: #60a5fa;
      --row-alt: #101a2e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
    }

    button, input, select {
      font: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }

    button {
      background: #1f2937;
      cursor: pointer;
    }

    button:hover { background: #273449; }
    input[type="range"] { padding: 0; }
    input[type="checkbox"] { transform: scale(1.1); }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .toolbar .path-input {
      flex: 1;
      min-width: 260px;
    }

    .page {
      display: flex;
      gap: 10px;
      min-height: calc(100vh - 58px);
      padding: 10px;
    }

    .sidebar {
      width: 420px;
      min-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .viewer-grid {
      flex: 0 0 auto;
      min-width: 0;
      display: flex;
      align-items: flex-start;
    }

    .viewer-splitter {
      flex: 0 0 14px;
      align-self: stretch;
      margin: 0 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(96, 165, 250, 0.12) 0%, rgba(96, 165, 250, 0.2) 100%);
      border: 1px solid rgba(96, 165, 250, 0.22);
      cursor: col-resize;
      position: relative;
      user-select: none;
      touch-action: none;
    }

    .viewer-splitter::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: clamp(72px, calc(100% * 0.26), 150px);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(229, 231, 235, 0.42);
      box-shadow: -6px 0 0 rgba(229, 231, 235, 0.18), 6px 0 0 rgba(229, 231, 235, 0.18);
    }

    body.splitter-dragging {
      cursor: col-resize;
      user-select: none;
    }

    .panel {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .panel-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px 10px;
      align-items: center;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: 100px 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .nav-grid .wide { grid-column: 2 / 5; }
    .nav-grid .span2 { grid-column: span 2; }

    .muted { color: var(--muted); }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .path-display,
    .summary-text {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 38px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .image-panel {
      flex: 1 1 720px;
      width: 720px;
      height: min(82vh, 860px);
      min-width: 520px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      background: var(--panel-2);
      resize: both;
      overflow: hidden;
    }

    .image-info-bar {
      flex: 0 0 auto;
      padding: 2px 2px 0;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-wrap {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: hidden;
    }

    #frameImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .frames-panel {
      flex: 0 0 auto;
      width: 620px;
      min-width: 420px;
      max-width: min(88vw, 1400px);
      height: min(82vh, 860px);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      resize: both;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1e293b;
      z-index: 1;
    }

    th, td {
      border-bottom: 1px solid #243041;
      padding: 8px 10px;
      text-align: left;
    }

    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr.active { background: rgba(96, 165, 250, 0.18); }
    tbody tr:hover { background: rgba(96, 165, 250, 0.1); cursor: pointer; }

    .table-wrap {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
    }

    .frames-panel .table-wrap {
      flex: 1 1 auto;
      min-height: 260px;
      max-height: none;
    }

    .frames-panel table {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
    }

    .frames-panel th,
    .frames-panel td {
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
    }

    .frames-panel th:nth-child(1),
    .frames-panel td:nth-child(1) {
      min-width: 56px;
    }

    .frames-panel th:nth-child(2),
    .frames-panel td:nth-child(2) {
      min-width: 180px;
    }

    .frames-panel th:nth-child(3),
    .frames-panel td:nth-child(3) {
      min-width: 120px;
    }

    .frames-panel th:nth-child(4),
    .frames-panel td:nth-child(4) {
      min-width: 180px;
    }

    .frames-panel th:nth-child(5),
    .frames-panel td:nth-child(5) {
      min-width: 110px;
    }

    .frames-panel th:nth-child(6),
    .frames-panel td:nth-child(6) {
      min-width: 220px;
    }

    .timeline-panel {
      flex: 0 0 auto;
    }

    .timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .timeline-header .panel-title {
      margin-bottom: 0;
    }

    .timeline-labels {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .timeline-labels span:nth-child(2) {
      text-align: center;
      color: var(--text);
      font-weight: 600;
    }

    .timeline-labels span:last-child {
      text-align: right;
    }

    .timeline-track-shell {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      overflow: hidden;
    }

    .timeline-track {
      position: relative;
      height: 56px;
      min-width: 0;
    }

    .timeline-track::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(96, 165, 250, 0.15) 0%, rgba(96, 165, 250, 0.65) 100%);
      box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.18);
    }

    .timeline-marker {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      padding: 0;
      border-radius: 999px;
      border: 2px solid rgba(229, 231, 235, 0.7);
      background: #1e293b;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.78);
      transition: transform 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .timeline-marker:hover {
      background: rgba(96, 165, 250, 0.35);
      transform: translate(-50%, -50%) scale(1.08);
    }

    .timeline-marker.active {
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-color: #eff6ff;
      box-shadow: 0 0 0 6px rgba(96, 165, 250, 0.22);
    }

    .timeline-marker.is-proofsheet {
      border-style: dashed;
      opacity: 0.78;
    }

    .timeline-marker:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 1), 0 0 0 7px rgba(96, 165, 250, 0.28);
    }

    @media (max-width: 1500px) {
      .frames-panel {
        width: 560px;
        height: min(76vh, 800px);
      }
    }

    .status-bar {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      background: var(--panel);
      position: sticky;
      bottom: 0;
    }

    @media (max-width: 1200px) {
      .page {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
      }

      .viewer-grid {
        flex-direction: column;
      }

      .viewer-splitter {
        display: none;
      }

      .frames-panel {
        width: 100%;
        min-width: 0;
        max-width: none;
        resize: none;
        overflow: visible;
        height: min(58vh, 620px);
      }

      .image-wrap {
        width: 100%;
      }

      .image-panel {
        width: 100%;
        min-width: 0;
        height: min(68vh, 680px);
        resize: vertical;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <select id="vendorSelect"></select>
    <input id="pathInput" class="path-input" type="text" placeholder="输入 FA 数据路径">
    <button id="openDirButton">选目录</button>
    <button id="openFileButton">选文件</button>
    <button id="loadButton">加载</button>
  </div>

  <div class="page">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-title">Input</div>
        <div class="form-grid">
          <div class="muted">路径</div>
          <div id="pathDisplay" class="path-display">未加载</div>
          <div class="muted">最近使用</div>
          <select id="recentSelect"></select>
          <div class="muted">隐藏</div>
          <label><input id="hideProofsheet" type="checkbox" checked> Proofsheet</label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">Navigation</div>
        <div class="nav-grid">
          <div class="muted">分组</div>
          <select id="groupSelect" class="wide"></select>
          <div class="muted">眼别</div>
          <select id="eyeSelect" class="wide"></select>
          <div class="muted">帧</div>
          <input id="frameSlider" class="wide" type="range" min="0" max="0" value="0">
          <button id="prevButton">上一帧</button>
          <input id="frameNumberInput" type="number" min="1" value="1">
          <button id="nextButton">下一帧</button>
          <button id="playButton">播放</button>
          <div class="muted">FPS</div>
          <input id="fpsInput" type="number" min="1" max="30" value="3">
          <div id="frameInfo" class="muted span2">Frame: -</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">Display</div>
        <div class="form-grid">
          <div class="muted">Contrast</div>
          <input id="contrastSlider" type="range" min="50" max="200" value="100">
          <div class="muted">Brightness</div>
          <input id="brightnessSlider" type="range" min="-80" max="80" value="0">
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">Patient</div>
        <div class="form-grid">
          <div class="muted">姓名</div><div id="patientName" class="path-display">-</div>
          <div class="muted">ID</div><div id="patientId" class="path-display">-</div>
          <div class="muted">检查日期</div><div id="examDate" class="path-display">-</div>
          <div class="muted">设备</div><div id="deviceInfo" class="path-display">-</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">Summary</div>
        <div id="summaryText" class="summary-text"></div>
      </section>

      <section class="panel" style="flex:1; min-height: 220px;">
        <div class="panel-title">Metadata</div>
        <div id="metadataText" class="summary-text mono" style="height: 100%; min-height: 180px;"></div>
      </section>
    </aside>

    <main class="main">
      <div class="viewer-grid">
        <section class="panel image-panel">
          <div id="imageInfoBar" class="image-info-bar">FA | - | Frame -/- | -</div>
          <div class="image-wrap">
            <img id="frameImage" alt="">
          </div>
        </section>

        <div id="viewerSplitter" class="viewer-splitter" role="separator" aria-orientation="vertical" aria-label="调整图像与 Frames 宽度"></div>

        <section class="panel frames-panel">
          <div class="panel-title">Frames</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>文件</th>
                  <th>分组</th>
                  <th>标签</th>
                  <th>相对时间</th>
                  <th>采集时间</th>
                </tr>
              </thead>
              <tbody id="frameTableBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <section class="panel timeline-panel">
        <div class="timeline-header">
          <div class="panel-title">时间轴</div>
          <div id="timelineSummary" class="muted">未加载帧</div>
        </div>
        <div class="timeline-labels">
          <span id="timelineStartLabel">-</span>
          <span id="timelineCurrentLabel">-</span>
          <span id="timelineEndLabel">-</span>
        </div>
        <div class="timeline-track-shell">
          <div id="timelineTrack" class="timeline-track" role="listbox" aria-label="帧时间轴"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="statusBar" class="status-bar">准备就绪</div>

  <script>
    const STORAGE_KEYS = {
      recentPaths: 'fa-web-viewer.recent-paths',
      lastPath: 'fa-web-viewer.last-path',
      vendorMode: 'fa-web-viewer.vendor-mode',
      imagePanelSize: 'fa-web-viewer.image-panel-size',
      framesPanelSize: 'fa-web-viewer.frames-panel-size',
    };

    const state = {
      payload: null,
      visibleFrames: [],
      currentVisibleIndex: -1,
      playing: false,
      timerId: null,
      timelineModel: null,
      imageLoading: false,
      playbackAdvancePending: false,
      datasetCacheToken: '',
      currentImageUrl: '',
      preloadedImageUrls: new Set(),
      rerenderTimerId: null,
    };

    const els = {
      vendorSelect: document.getElementById('vendorSelect'),
      pathInput: document.getElementById('pathInput'),
      openDirButton: document.getElementById('openDirButton'),
      openFileButton: document.getElementById('openFileButton'),
      loadButton: document.getElementById('loadButton'),
      recentSelect: document.getElementById('recentSelect'),
      hideProofsheet: document.getElementById('hideProofsheet'),
      groupSelect: document.getElementById('groupSelect'),
      eyeSelect: document.getElementById('eyeSelect'),
      frameSlider: document.getElementById('frameSlider'),
      frameNumberInput: document.getElementById('frameNumberInput'),
      prevButton: document.getElementById('prevButton'),
      nextButton: document.getElementById('nextButton'),
      playButton: document.getElementById('playButton'),
      fpsInput: document.getElementById('fpsInput'),
      contrastSlider: document.getElementById('contrastSlider'),
      brightnessSlider: document.getElementById('brightnessSlider'),
      frameImage: document.getElementById('frameImage'),
      imageInfoBar: document.getElementById('imageInfoBar'),
      imagePanel: document.querySelector('.image-panel'),
      framesPanel: document.querySelector('.frames-panel'),
      viewerGrid: document.querySelector('.viewer-grid'),
      viewerSplitter: document.getElementById('viewerSplitter'),
      frameTableBody: document.getElementById('frameTableBody'),
      statusBar: document.getElementById('statusBar'),
      pathDisplay: document.getElementById('pathDisplay'),
      summaryText: document.getElementById('summaryText'),
      metadataText: document.getElementById('metadataText'),
      frameInfo: document.getElementById('frameInfo'),
      patientName: document.getElementById('patientName'),
      patientId: document.getElementById('patientId'),
      examDate: document.getElementById('examDate'),
      deviceInfo: document.getElementById('deviceInfo'),
      timelineSummary: document.getElementById('timelineSummary'),
      timelineStartLabel: document.getElementById('timelineStartLabel'),
      timelineCurrentLabel: document.getElementById('timelineCurrentLabel'),
      timelineEndLabel: document.getElementById('timelineEndLabel'),
      timelineTrack: document.getElementById('timelineTrack'),
    };

    function setStatus(message) {
      els.statusBar.textContent = message;
    }

    async function apiJson(url) {
      const response = await fetch(url);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    function currentVendorMode() {
      return els.vendorSelect.value || 'auto';
    }

    function loadRecentPaths() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEYS.recentPaths)) || [];
        return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
      } catch {
        return [];
      }
    }

    function saveRecentPath(path) {
      if (!path) return;
      const normalized = String(path).trim();
      if (!normalized) return;
      const recentPaths = loadRecentPaths().filter((item) => item !== normalized);
      recentPaths.unshift(normalized);
      localStorage.setItem(STORAGE_KEYS.recentPaths, JSON.stringify(recentPaths.slice(0, 8)));
      localStorage.setItem(STORAGE_KEYS.lastPath, normalized);
    }

    function mergedRecentPaths(payload) {
      const localRecent = loadRecentPaths();
      const serverRecent = Array.isArray(payload?.recentPaths) ? payload.recentPaths.filter(Boolean) : [];
      return [...new Set([...serverRecent, ...localRecent])].slice(0, 8);
    }

    function loadStoredPanelSize(key) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || 'null');
        if (!parsed || typeof parsed !== 'object') return null;
        const width = Number(parsed.width);
        const height = Number(parsed.height);
        return {
          width: Number.isFinite(width) ? width : null,
          height: Number.isFinite(height) ? height : null,
        };
      } catch {
        return null;
      }
    }

    function savePanelSize(key, element) {
      if (!element || window.innerWidth <= 1200) return;
      const rect = element.getBoundingClientRect();
      const payload = {
        width: Math.round(rect.width),
        height: Math.round(rect.height),
      };
      localStorage.setItem(key, JSON.stringify(payload));
    }

    function applyStoredPanelSize(key, element, options = {}) {
      if (!element || window.innerWidth <= 1200) return;
      const stored = loadStoredPanelSize(key);
      if (!stored) return;

      const minWidth = options.minWidth || 0;
      const minHeight = options.minHeight || 0;
      const maxWidth = options.maxWidth || Math.max(window.innerWidth - 80, minWidth);
      const maxHeight = options.maxHeight || Math.max(window.innerHeight - 120, minHeight);

      if (stored.width) {
        const width = Math.max(minWidth, Math.min(stored.width, maxWidth));
        element.style.width = `${width}px`;
      }
      if (stored.height) {
        const height = Math.max(minHeight, Math.min(stored.height, maxHeight));
        element.style.height = `${height}px`;
      }
    }

    function setupPanelPersistence() {
      applyStoredPanelSize(STORAGE_KEYS.imagePanelSize, els.imagePanel, {
        minWidth: 520,
        minHeight: 420,
        maxWidth: Math.max(window.innerWidth - 520, 520),
        maxHeight: Math.max(window.innerHeight - 120, 420),
      });
      applyStoredPanelSize(STORAGE_KEYS.framesPanelSize, els.framesPanel, {
        minWidth: 420,
        minHeight: 320,
        maxWidth: Math.max(window.innerWidth - 460, 420),
        maxHeight: Math.max(window.innerHeight - 120, 320),
      });

      if (typeof ResizeObserver === 'undefined') {
        return;
      }

      let timerId = null;
      const scheduleSave = () => {
        if (timerId !== null) {
          clearTimeout(timerId);
        }
        timerId = window.setTimeout(() => {
          savePanelSize(STORAGE_KEYS.imagePanelSize, els.imagePanel);
          savePanelSize(STORAGE_KEYS.framesPanelSize, els.framesPanel);
        }, 120);
      };

      const observer = new ResizeObserver(() => {
        scheduleSave();
      });

      observer.observe(els.imagePanel);
      observer.observe(els.framesPanel);
      window.addEventListener('beforeunload', () => {
        savePanelSize(STORAGE_KEYS.imagePanelSize, els.imagePanel);
        savePanelSize(STORAGE_KEYS.framesPanelSize, els.framesPanel);
      });
    }

    function setupViewerSplitter() {
      if (!els.viewerSplitter || !els.viewerGrid) return;

      const minImageWidth = 520;
      const minFramesWidth = 420;
      let activeDrag = null;

      const stopDrag = () => {
        if (!activeDrag) return;
        activeDrag = null;
        document.body.classList.remove('splitter-dragging');
        savePanelSize(STORAGE_KEYS.imagePanelSize, els.imagePanel);
        savePanelSize(STORAGE_KEYS.framesPanelSize, els.framesPanel);
      };

      const onPointerMove = (event) => {
        if (!activeDrag || window.innerWidth <= 1200) return;

        const deltaX = event.clientX - activeDrag.startX;
        const nextImageWidth = Math.max(
          minImageWidth,
          Math.min(activeDrag.totalWidth - minFramesWidth, activeDrag.startImageWidth + deltaX),
        );
        const nextFramesWidth = Math.max(minFramesWidth, activeDrag.totalWidth - nextImageWidth);

        els.imagePanel.style.width = `${Math.round(nextImageWidth)}px`;
        els.framesPanel.style.width = `${Math.round(nextFramesWidth)}px`;
      };

      els.viewerSplitter.addEventListener('pointerdown', (event) => {
        if (window.innerWidth <= 1200) return;
        event.preventDefault();

        const imageRect = els.imagePanel.getBoundingClientRect();
        const framesRect = els.framesPanel.getBoundingClientRect();
        activeDrag = {
          startX: event.clientX,
          startImageWidth: imageRect.width,
          totalWidth: imageRect.width + framesRect.width,
        };

        document.body.classList.add('splitter-dragging');
        els.viewerSplitter.setPointerCapture?.(event.pointerId);
      });

      els.viewerSplitter.addEventListener('pointermove', onPointerMove);
      els.viewerSplitter.addEventListener('pointerup', stopDrag);
      els.viewerSplitter.addEventListener('pointercancel', stopDrag);
      window.addEventListener('pointerup', stopDrag);
    }

    function formatTimelineDateTime(value) {
      if (!value) return '-';
      const parsed = new Date(value);
      if (!Number.isFinite(parsed.getTime())) return '-';
      return parsed.toLocaleString('zh-CN', { hour12: false });
    }

    function getFrameElapsedValue(frame) {
      const value = Number(frame?.elapsedSeconds);
      return Number.isFinite(value) ? value : null;
    }

    function getFrameAcquisitionValue(frame) {
      const value = Date.parse(frame?.acquisitionDatetime || '');
      return Number.isFinite(value) ? value / 1000 : null;
    }

    function getTimelineLabelForFrame(frame, mode) {
      if (!frame) return '-';
      if (mode === 'elapsed') {
        return frame.elapsedDisplay || frame.acquisitionDisplay || '-';
      }
      if (mode === 'acquisition') {
        return frame.acquisitionDisplay || formatTimelineDateTime(frame.acquisitionDatetime) || frame.elapsedDisplay || '-';
      }
      return `Frame ${frame.originalIndex + 1}`;
    }

    function getTimelineModeLabel(mode) {
      if (mode === 'elapsed') return '相对时间';
      if (mode === 'acquisition') return '采集时间';
      return '帧顺序';
    }

    function buildTimelineModel(frames) {
      const defaultPositions = frames.map((_, index) => (
        frames.length <= 1 ? 0.5 : index / (frames.length - 1)
      ));

      const buildScaledModel = (mode, values) => {
        const validValues = values.filter((value) => value !== null);
        if (validValues.length < 2) return null;
        const minValue = Math.min(...validValues);
        const maxValue = Math.max(...validValues);
        if (!Number.isFinite(minValue) || !Number.isFinite(maxValue) || maxValue <= minValue) {
          return null;
        }
        return {
          mode,
          positions: values.map((value, index) => (
            value === null ? defaultPositions[index] : (value - minValue) / (maxValue - minValue)
          )),
        };
      };

      return (
        buildScaledModel('acquisition', frames.map(getFrameAcquisitionValue))
        || buildScaledModel('elapsed', frames.map(getFrameElapsedValue))
        || { mode: 'index', positions: defaultPositions }
      );
    }

    function clearTimeline(summary = '未加载帧') {
      state.timelineModel = null;
      els.timelineSummary.textContent = summary;
      els.timelineStartLabel.textContent = '-';
      els.timelineCurrentLabel.textContent = '-';
      els.timelineEndLabel.textContent = '-';
      els.timelineTrack.innerHTML = '';
    }

    function buildTimelineMarkerTitle(frame, visibleIndex, mode) {
      return [
        `第 ${visibleIndex + 1}/${state.visibleFrames.length} 帧`,
        frame.filename || '',
        frame.groupLabel || '',
        frame.lateralityLabel || '',
        frame.label || '',
        getTimelineLabelForFrame(frame, mode),
      ].filter(Boolean).join('\n');
    }

    function renderTimeline() {
      if (!state.visibleFrames.length) {
        clearTimeline('暂无可显示帧');
        return;
      }

      const model = buildTimelineModel(state.visibleFrames);
      state.timelineModel = model;

      els.timelineSummary.textContent = `${getTimelineModeLabel(model.mode)} · ${state.visibleFrames.length} 帧`;
      els.timelineStartLabel.textContent = getTimelineLabelForFrame(state.visibleFrames[0], model.mode);
      els.timelineEndLabel.textContent = getTimelineLabelForFrame(
        state.visibleFrames[state.visibleFrames.length - 1],
        model.mode,
      );

      els.timelineTrack.innerHTML = '';
      state.visibleFrames.forEach((frame, visibleIndex) => {
        const marker = document.createElement('button');
        marker.type = 'button';
        marker.className = 'timeline-marker';
        if (frame.isProofsheet) {
          marker.classList.add('is-proofsheet');
        }
        marker.dataset.index = String(visibleIndex);
        marker.style.left = `${(model.positions[visibleIndex] * 100).toFixed(4)}%`;
        marker.title = buildTimelineMarkerTitle(frame, visibleIndex, model.mode);
        marker.setAttribute('role', 'option');
        marker.setAttribute('aria-label', buildTimelineMarkerTitle(frame, visibleIndex, model.mode));
        marker.addEventListener('click', () => gotoFrame(visibleIndex));
        els.timelineTrack.appendChild(marker);
      });

      updateTimelineSelection();
    }

    function updateTimelineSelection() {
      const frame = state.visibleFrames[state.currentVisibleIndex];
      for (const marker of els.timelineTrack.querySelectorAll('.timeline-marker')) {
        const active = Number(marker.dataset.index) === state.currentVisibleIndex;
        marker.classList.toggle('active', active);
        marker.setAttribute('aria-selected', active ? 'true' : 'false');
      }

      if (!frame || !state.timelineModel) {
        els.timelineCurrentLabel.textContent = '-';
        return;
      }

      const label = getTimelineLabelForFrame(frame, state.timelineModel.mode);
      const parts = [`第 ${state.currentVisibleIndex + 1}/${state.visibleFrames.length} 帧`];
      if (frame.groupLabel) parts.push(frame.groupLabel);
      if (frame.lateralityLabel) parts.push(frame.lateralityLabel);
      if (frame.label) parts.push(frame.label);
      if (label && label !== '-') parts.push(label);
      els.timelineCurrentLabel.textContent = parts.join(' · ');
    }

    function buildFrameImageUrl(frame) {
      const contrast = Number(els.contrastSlider.value) || 100;
      const brightness = Number(els.brightnessSlider.value) || 0;
      const datasetToken = encodeURIComponent(state.datasetCacheToken || 'default');
      return `/api/frame/${frame.originalIndex}.png?contrast=${contrast}&brightness=${brightness}&ds=${datasetToken}`;
    }

    function rememberPreloadedUrl(url) {
      state.preloadedImageUrls.add(url);
      if (state.preloadedImageUrls.size > 400) {
        state.preloadedImageUrls.clear();
        state.preloadedImageUrls.add(url);
      }
    }

    function preloadFrameAt(index) {
      if (!state.visibleFrames.length) return;
      if (index < 0 || index >= state.visibleFrames.length) return;
      const frame = state.visibleFrames[index];
      const url = buildFrameImageUrl(frame);
      if (url === state.currentImageUrl || state.preloadedImageUrls.has(url)) return;
      const image = new Image();
      image.decoding = 'async';
      image.src = url;
      rememberPreloadedUrl(url);
    }

    function preloadNeighbors(centerIndex) {
      preloadFrameAt(centerIndex + 1);
      preloadFrameAt(centerIndex + 2);
      preloadFrameAt(centerIndex - 1);
    }

    function scheduleCurrentFrameRerender() {
      if (state.currentVisibleIndex < 0) return;
      if (state.rerenderTimerId !== null) {
        clearTimeout(state.rerenderTimerId);
      }
      state.rerenderTimerId = window.setTimeout(() => {
        state.rerenderTimerId = null;
        gotoFrame(state.currentVisibleIndex);
      }, 45);
    }

    function stopPlayback() {
      state.playing = false;
      state.playbackAdvancePending = false;
      if (state.timerId !== null) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      els.playButton.textContent = '播放';
    }

    function startPlayback() {
      stopPlayback();
      const fps = Math.max(1, Number(els.fpsInput.value) || 3);
      state.playing = true;
      state.playbackAdvancePending = false;
      els.playButton.textContent = '暂停';
      state.timerId = window.setInterval(() => {
        if (state.imageLoading) {
          state.playbackAdvancePending = true;
          return;
        }
        gotoFrame(state.currentVisibleIndex + 1);
      }, Math.round(1000 / fps));
    }

    function togglePlayback() {
      if (!state.visibleFrames.length) return;
      if (state.playing) {
        stopPlayback();
      } else {
        startPlayback();
      }
    }

    function renderVendorOptions(payload) {
      const previous = localStorage.getItem(STORAGE_KEYS.vendorMode) || els.vendorSelect.value || 'auto';
      els.vendorSelect.innerHTML = '';
      for (const item of payload.supportedVendors || []) {
        const option = document.createElement('option');
        option.value = item.value;
        option.textContent = item.label;
        els.vendorSelect.appendChild(option);
      }
      els.vendorSelect.value = previous || payload.vendorMode || 'auto';
    }

    function renderRecentPaths(payload) {
      const recentPaths = mergedRecentPaths(payload);
      els.recentSelect.innerHTML = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = recentPaths.length ? '选择最近路径' : '暂无最近路径';
      els.recentSelect.appendChild(placeholder);
      for (const item of recentPaths) {
        const option = document.createElement('option');
        option.value = item;
        option.textContent = item;
        els.recentSelect.appendChild(option);
      }
    }

    function resetFrameSelectors() {
      els.groupSelect.innerHTML = '<option value="ALL">全部</option>';
      els.eyeSelect.innerHTML = '<option value="ALL">全部</option>';
      els.frameSlider.max = 0;
      els.frameSlider.value = 0;
      els.frameNumberInput.value = 1;
      els.frameNumberInput.max = 1;
    }

    function setEmptyView(message) {
      stopPlayback();
      state.visibleFrames = [];
      state.currentVisibleIndex = -1;
      state.imageLoading = false;
      state.currentImageUrl = '';
      state.datasetCacheToken = '';
      state.preloadedImageUrls.clear();
      els.pathDisplay.textContent = message || '未加载';
      els.summaryText.textContent = '准备加载 Topcon / Zeiss / HDB FA 数据';
      els.metadataText.textContent = '';
      els.frameInfo.textContent = 'Frame: -';
      els.patientName.textContent = '-';
      els.patientId.textContent = '-';
      els.examDate.textContent = '-';
      els.deviceInfo.textContent = '-';
      els.imageInfoBar.textContent = 'FA | - | Frame -/- | -';
      els.frameImage.removeAttribute('src');
      els.frameTableBody.innerHTML = '';
      clearTimeline();
      resetFrameSelectors();
    }

    function applyPayload(payload) {
      state.payload = payload;
      if (payload.loaded) {
        const dataset = payload.dataset || {};
        saveRecentPath(dataset.inputPath || payload.sourcePath || '');
      }
      renderVendorOptions(payload);
      renderRecentPaths(payload);

      if (!payload.loaded) {
        setEmptyView('未加载');
        return;
      }

      const dataset = payload.dataset || {};
      state.datasetCacheToken = [
        payload.sourcePath || dataset.inputPath || '',
        dataset.vendor || '',
        String(dataset.frameCount || 0),
      ].join('|');
      state.preloadedImageUrls.clear();
      state.currentImageUrl = '';
      state.imageLoading = false;
      els.pathInput.value = payload.sourcePath || dataset.inputPath || '';
      els.pathDisplay.textContent = dataset.inputPath || payload.sourcePath || '-';
      els.summaryText.textContent = dataset.summaryText || '';
      els.patientName.textContent = dataset.patientName || '-';
      els.patientId.textContent = dataset.patientId || '-';
      els.examDate.textContent = dataset.examDate || '-';
      els.deviceInfo.textContent = dataset.deviceModel || '-';

      const currentGroup = els.groupSelect.value || 'ALL';
      const currentEye = els.eyeSelect.value || 'ALL';

      els.groupSelect.innerHTML = '';
      const allGroupOption = document.createElement('option');
      allGroupOption.value = 'ALL';
      allGroupOption.textContent = '全部';
      els.groupSelect.appendChild(allGroupOption);
      for (const group of payload.groups || []) {
        const option = document.createElement('option');
        option.value = group;
        option.textContent = group;
        els.groupSelect.appendChild(option);
      }
      els.groupSelect.value = (payload.groups || []).includes(currentGroup) ? currentGroup : 'ALL';

      els.eyeSelect.innerHTML = '';
      const allEyeOption = document.createElement('option');
      allEyeOption.value = 'ALL';
      allEyeOption.textContent = '全部';
      els.eyeSelect.appendChild(allEyeOption);
      for (const eye of payload.lateralityOptions || []) {
        const option = document.createElement('option');
        option.value = eye;
        option.textContent = eye;
        els.eyeSelect.appendChild(option);
      }
      els.eyeSelect.value = (payload.lateralityOptions || []).includes(currentEye) ? currentEye : 'ALL';

      refreshVisibleFrames();
    }

    function filteredFrames() {
      if (!state.payload || !state.payload.loaded) return [];
      const selectedGroup = els.groupSelect.value || 'ALL';
      const selectedEye = els.eyeSelect.value || 'ALL';
      const hideProofsheet = els.hideProofsheet.checked;
      return (state.payload.frames || []).filter((frame) => {
        if (selectedGroup !== 'ALL' && frame.groupLabel !== selectedGroup) return false;
        if (selectedEye !== 'ALL' && frame.lateralityLabel !== selectedEye) return false;
        if (hideProofsheet && frame.isProofsheet) return false;
        return true;
      });
    }

    function refreshVisibleFrames() {
      if (!state.payload || !state.payload.loaded) {
        setEmptyView('未加载');
        return;
      }

      const previous = state.visibleFrames[state.currentVisibleIndex];
      const previousIndex = previous ? previous.originalIndex : null;
      state.visibleFrames = filteredFrames();

      if (!state.visibleFrames.length) {
        stopPlayback();
        els.frameTableBody.innerHTML = '';
        els.frameImage.removeAttribute('src');
        state.imageLoading = false;
        state.currentImageUrl = '';
        state.preloadedImageUrls.clear();
        els.imageInfoBar.textContent = 'FA | - | Frame -/- | -';
        els.metadataText.textContent = '';
        els.frameInfo.textContent = 'Frame: -';
        clearTimeline('暂无可显示帧');
        return;
      }

      let targetIndex = 0;
      if (previousIndex !== null) {
        const matched = state.visibleFrames.findIndex((frame) => frame.originalIndex === previousIndex);
        if (matched >= 0) targetIndex = matched;
      }

      renderFrameTable();
      renderTimeline();
      gotoFrame(targetIndex);
    }

    function renderFrameTable() {
      els.frameTableBody.innerHTML = '';
      state.visibleFrames.forEach((frame, visibleIndex) => {
        const tr = document.createElement('tr');
        tr.dataset.index = String(visibleIndex);
        tr.innerHTML = `
          <td>${frame.originalIndex + 1}</td>
          <td>${escapeHtml(frame.filename || '-')}</td>
          <td>${escapeHtml(frame.groupLabel || '-')}</td>
          <td>${escapeHtml(frame.label || '-')}</td>
          <td>${escapeHtml(frame.elapsedDisplay || '-')}</td>
          <td>${escapeHtml(frame.acquisitionDisplay || '-')}</td>
        `;
        tr.addEventListener('click', () => gotoFrame(visibleIndex));
        els.frameTableBody.appendChild(tr);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function gotoFrame(index) {
      if (!state.visibleFrames.length) return;

      const normalized = ((index % state.visibleFrames.length) + state.visibleFrames.length) % state.visibleFrames.length;
      state.currentVisibleIndex = normalized;

      const frame = state.visibleFrames[normalized];
      const dataset = state.payload.dataset || {};
      const groupText = frame.groupLabel || dataset.vendorLabel || 'FA';
      const eyeText = frame.lateralityLabel || dataset.laterality || '-';
      const timeText = frame.acquisitionDisplay || '-';

      els.frameSlider.max = Math.max(state.visibleFrames.length - 1, 0);
      els.frameSlider.value = normalized;
      els.frameNumberInput.max = Math.max(state.visibleFrames.length, 1);
      els.frameNumberInput.value = normalized + 1;
      els.frameInfo.textContent = `Frame: ${normalized + 1}/${state.visibleFrames.length}`;
      els.imageInfoBar.textContent = `${groupText} | ${eyeText} | Frame ${normalized + 1}/${state.visibleFrames.length} | ${timeText}`;
      els.metadataText.textContent = frame.metadataText || '';

      const imageUrl = buildFrameImageUrl(frame);
      if (state.currentImageUrl !== imageUrl || els.frameImage.getAttribute('src') !== imageUrl) {
        state.imageLoading = true;
        state.currentImageUrl = imageUrl;
        els.frameImage.src = imageUrl;
        rememberPreloadedUrl(imageUrl);
      } else {
        state.imageLoading = false;
      }
      preloadNeighbors(normalized);

      for (const row of els.frameTableBody.querySelectorAll('tr')) {
        row.classList.toggle('active', Number(row.dataset.index) === normalized);
      }

      updateTimelineSelection();
      setStatus(`${frame.filename} | ${groupText} | ${timeText}`);
    }

    function onFrameImageSettled() {
      state.imageLoading = false;
      if (!state.playing || !state.playbackAdvancePending) return;
      state.playbackAdvancePending = false;
      window.requestAnimationFrame(() => {
        if (!state.playing || state.imageLoading) return;
        gotoFrame(state.currentVisibleIndex + 1);
      });
    }

    async function loadCurrentPath() {
      const path = els.pathInput.value.trim();
      if (!path) {
        setStatus('请先输入路径');
        return;
      }

      stopPlayback();
      setStatus('正在加载数据...');
      try {
        const payload = await apiJson(`/api/load?path=${encodeURIComponent(path)}&vendor=${encodeURIComponent(currentVendorMode())}`);
        applyPayload(payload);
        setStatus(`已加载：${payload.dataset ? payload.dataset.inputPath : path}`);
      } catch (error) {
        setStatus(error.message);
        alert(error.message);
      }
    }

    async function pickPath(kind) {
      stopPlayback();
      setStatus(kind === 'directory' ? '正在打开目录选择器...' : '正在打开文件选择器...');
      try {
        const endpoint = kind === 'directory' ? '/api/pick-directory' : '/api/pick-file';
        const payload = await apiJson(`${endpoint}?vendor=${encodeURIComponent(currentVendorMode())}`);
        if (payload.cancelled) {
          setStatus('已取消选择');
          return;
        }
        applyPayload(payload);
        setStatus(`已加载：${payload.dataset ? payload.dataset.inputPath : ''}`);
      } catch (error) {
        setStatus(error.message);
        alert(error.message);
      }
    }

    async function initialize() {
      try {
        setupPanelPersistence();
        setupViewerSplitter();
        const payload = await apiJson('/api/state');
        renderVendorOptions(payload);
        renderRecentPaths(payload);
        applyPayload(payload);
        if (!payload.loaded) {
          const lastPath = localStorage.getItem(STORAGE_KEYS.lastPath) || (payload.recentPaths || [])[0] || '';
          if (lastPath && !els.pathInput.value.trim()) {
            els.pathInput.value = lastPath;
          }
        }
        setStatus('准备就绪');
      } catch (error) {
        setStatus(error.message);
      }
    }

    els.loadButton.addEventListener('click', loadCurrentPath);
    els.openDirButton.addEventListener('click', () => pickPath('directory'));
    els.openFileButton.addEventListener('click', () => pickPath('file'));

    els.recentSelect.addEventListener('change', () => {
      if (els.recentSelect.value) {
        els.pathInput.value = els.recentSelect.value;
        loadCurrentPath();
      }
    });

    els.vendorSelect.addEventListener('change', () => {
      localStorage.setItem(STORAGE_KEYS.vendorMode, currentVendorMode());
    });

    els.groupSelect.addEventListener('change', refreshVisibleFrames);
    els.eyeSelect.addEventListener('change', refreshVisibleFrames);
    els.hideProofsheet.addEventListener('change', refreshVisibleFrames);
    els.frameSlider.addEventListener('input', () => gotoFrame(Number(els.frameSlider.value)));
    els.frameNumberInput.addEventListener('change', () => gotoFrame(Number(els.frameNumberInput.value) - 1));
    els.prevButton.addEventListener('click', () => gotoFrame(state.currentVisibleIndex - 1));
    els.nextButton.addEventListener('click', () => gotoFrame(state.currentVisibleIndex + 1));
    els.playButton.addEventListener('click', togglePlayback);

    els.fpsInput.addEventListener('change', () => {
      if (state.playing) startPlayback();
    });

    els.contrastSlider.addEventListener('input', scheduleCurrentFrameRerender);
    els.brightnessSlider.addEventListener('input', scheduleCurrentFrameRerender);
    els.frameImage.decoding = 'async';
    els.frameImage.addEventListener('load', onFrameImageSettled);
    els.frameImage.addEventListener('error', onFrameImageSettled);

    els.pathInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') loadCurrentPath();
    });

    window.addEventListener('keydown', (event) => {
      if (event.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target.tagName)) {
        if (event.key !== 'Escape') return;
      }

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        gotoFrame(state.currentVisibleIndex - 1);
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        gotoFrame(state.currentVisibleIndex + 1);
      } else if (event.code === 'Space') {
        event.preventDefault();
        togglePlayback();
      }
    });

    initialize();
  </script>
</body>
</html>
