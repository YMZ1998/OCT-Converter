<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCT Web Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
    }

    .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      min-width: 180px;
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title .dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 999px;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.85);
    }

    .pathbar {
      flex: 1;
      display: flex;
      gap: 10px;
      min-width: 320px;
    }

    input[type="text"], select, input[type="range"] { width: 100%; }
    input[type="text"], select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    button {
      padding: 10px 14px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--border);
    }

    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .grow { flex: 1 1 280px; }
    .status { width: 100%; color: var(--muted); font-size: 13px; }
    .status.error { color: var(--danger); }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }

    .panel {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      padding: 14px 16px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      background: rgba(31, 41, 55, 0.65);
    }

    .panel-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: calc(100% - 52px);
      min-height: 0;
    }

    .kv {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }

    .kv div:nth-child(odd) { color: var(--muted); }
    .viewer-wrap { display: grid; grid-template-rows: auto 1fr auto; gap: 12px; height: 100%; }
    .viewer-toolbar { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .viewer-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .control { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--muted); }
    .compare-view {
      display: grid;
      grid-template-columns: minmax(220px, 0.72fr) minmax(520px, 1.28fr);
      gap: 10px;
      min-height: 0;
      align-items: stretch;
    }

    .view-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      min-width: 0;
    }

    .view-title { font-size: 13px; color: var(--muted); font-weight: 600; }
    .view-hint { display: none !important; min-height: 0; }

    .canvas-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.02) 75%),
        linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.02) 75%),
        #020617;
      background-size: 24px 24px;
      background-position: 0 0, 12px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-height: clamp(300px, 54vh, 620px);
      max-height: clamp(320px, 64vh, 720px);
      flex: 1 1 auto;
      width: 100%;
    }

    #fundusStage { cursor: crosshair; }
    #stage {
      padding: 4px;
      min-height: clamp(280px, 56vh, 680px);
      max-height: clamp(320px, 70vh, 760px);
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .empty { color: var(--muted); text-align: center; padding: 24px; line-height: 1.8; }
    .thumb {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      min-height: 160px;
      max-height: 240px;
      height: auto;
      object-fit: contain;
    }

    .meta {
      flex: 1;
      min-height: 0;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.55;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
    }

    .hint { font-size: 12px; color: var(--muted); }
    .panel.side-right { display: none; }

    @media (max-width: 1280px) {
      .layout { grid-template-columns: 280px 1fr; }
      .compare-view { grid-template-columns: minmax(220px, 0.76fr) minmax(420px, 1.24fr); }
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .viewer-toolbar, .viewer-controls, .compare-view { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title"><span class="dot"></span> OCT Web Viewer</div>
      <div class="pathbar">
        <input id="pathInput" class="grow" type="text" placeholder="输入 OCT 文件路径，例如 D:\data\sample.e2e">
        <button id="browseButton" class="secondary">选择文件</button>
        <button id="loadButton">加载文件</button>
        <input id="fileInput" type="file" accept=".fds,.FDS,.fda,.FDA,.e2e,.E2E,.img,.IMG,.oct,.OCT,.dcm,.DCM,.dicom,.DICOM" hidden>
        <button id="refreshButton" class="secondary">刷新状态</button>
        <button id="resetViewButton" class="secondary">重置视图</button>
      </div>
      <div id="status" class="status">等待加载 OCT 文件。</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">数据概览</div>
        <div class="panel-body">
          <div class="kv">
            <div>Reader</div><div id="readerValue">-</div>
            <div>文件路径</div><div id="pathValue">-</div>
            <div>Volume 数</div><div id="volumeCountValue">0</div>
            <div>Fundus 数</div><div id="fundusCountValue">0</div>
          </div>
          <div class="control">
            <label for="recentSelect">最近文件</label>
            <select id="recentSelect">
              <option value="">暂无历史记录</option>
            </select>
          </div>
          <div class="control">
            <label for="volumeSelect">选择 Volume</label>
            <select id="volumeSelect"></select>
          </div>
          <div class="control">
            <label for="fundusSelect">选择 Fundus</label>
            <select id="fundusSelect"></select>
          </div>
          <div class="pill" id="volumeBadge">未加载</div>
          <div class="hint">支持滚轮切片、方向键切片、空格播放。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">OCT 切片查看</div>
        <div class="panel-body">
          <div class="viewer-wrap">
            <div class="viewer-toolbar">
              <div class="control">
                <label for="sliceSlider">切片</label>
                <input id="sliceSlider" type="range" min="0" max="0" value="0">
                <div id="sliceLabel" class="hint">Slice 0 / 0</div>
              </div>
              <div class="viewer-controls">
                <button id="prevButton" class="secondary">上一张</button>
                <button id="playButton" class="secondary">播放</button>
                <button id="nextButton" class="secondary">下一张</button>
                <button id="zoomOutButton" class="secondary">缩小</button>
                <button id="zoomResetButton" class="secondary">100%</button>
                <button id="zoomInButton" class="secondary">放大</button>
                <button id="overlayButton" class="secondary">轮廓开</button>
                <button id="infoButton" class="secondary" hidden>提示开</button>
              </div>
            </div>

            <div class="compare-view">
              <div class="view-panel">
                <div class="view-title" id="fundusViewTitle">定位图 / Fundus</div>
                <div class="hint view-hint" id="fundusViewHint">左侧显示定位图，点击定位线可跳转到对应切片。</div>
                <div class="canvas-stage" id="fundusStage">
                  <canvas id="fundusCanvas" width="1024" height="1024"></canvas>
                  <div id="fundusEmptyState" class="empty">加载后会在这里显示定位图和扫描定位线。</div>
                </div>
              </div>

              <div class="view-panel">
                <div class="view-title" id="bscanViewTitle">当前 B-Scan</div>
                <div class="hint view-hint" id="bscanViewHint">右侧显示与左侧定位线匹配的当前切片。</div>
                <div class="canvas-stage" id="stage">
              <canvas id="octCanvas" width="1024" height="512"></canvas>
              <div id="emptyState" class="empty">加载后会在这里显示 OCT 切片。</div>
                </div>
              </div>
            </div>

            <div class="viewer-controls">
              <div class="control">
                <label for="contrastSlider">对比度</label>
                <input id="contrastSlider" type="range" min="50" max="300" value="100">
                <div id="contrastLabel" class="hint">100%</div>
              </div>
              <div class="control">
                <label for="brightnessSlider">亮度</label>
                <input id="brightnessSlider" type="range" min="-100" max="100" value="0">
                <div id="brightnessLabel" class="hint">0</div>
              </div>
              <div class="control">
                <label for="speedSlider">播放速度</label>
                <input id="speedSlider" type="range" min="1" max="12" value="5">
                <div id="speedLabel" class="hint">5 FPS</div>
              </div>
              <div class="control">
                <label>轮廓图层</label>
                <div id="contourNames" class="hint">-</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel side-right">
        <div class="panel-header">投影与眼底</div>
        <div class="panel-body">
          <div class="control">
            <label>Projection</label>
            <img id="projectionImage" class="thumb" alt="projection preview">
          </div>
          <div class="control">
            <label>Fundus</label>
            <img id="fundusImage" class="thumb" alt="fundus preview">
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = {
      recentFiles: "oct-web-viewer.recent-files",
      uiState: "oct-web-viewer.ui-state",
    };

    const DEFAULT_UI_STATE = {
      contrast: 100,
      brightness: 0,
      speed: 5,
      bscanZoom: 1,
      overlay: true,
      showInfo: true,
      lastPath: "",
    };

    const state = {
      data: null,
      volumeIndex: 0,
      fundusIndex: 0,
      sliceIndex: 0,
      overlay: true,
      showInfo: true,
      playing: false,
      busy: false,
      timer: null,
      renderToken: 0,
      canvasNaturalWidth: 1024,
      canvasNaturalHeight: 512,
      bscanCrop: null,
      bscanZoom: 1,
      fundusNaturalWidth: 1024,
      fundusNaturalHeight: 1024,
      playbackGeneration: 0,
      fundusViewCacheKey: "",
      fundusViewCacheCanvas: null,
      contourCache: new Map(),
    };

    const elements = {
      pathInput: document.getElementById("pathInput"),
      browseButton: document.getElementById("browseButton"),
      loadButton: document.getElementById("loadButton"),
      fileInput: document.getElementById("fileInput"),
      refreshButton: document.getElementById("refreshButton"),
      resetViewButton: document.getElementById("resetViewButton"),
      status: document.getElementById("status"),
      readerValue: document.getElementById("readerValue"),
      pathValue: document.getElementById("pathValue"),
      volumeCountValue: document.getElementById("volumeCountValue"),
      fundusCountValue: document.getElementById("fundusCountValue"),
      recentSelect: document.getElementById("recentSelect"),
      volumeSelect: document.getElementById("volumeSelect"),
      fundusSelect: document.getElementById("fundusSelect"),
      volumeBadge: document.getElementById("volumeBadge"),
      sliceSlider: document.getElementById("sliceSlider"),
      sliceLabel: document.getElementById("sliceLabel"),
      prevButton: document.getElementById("prevButton"),
      playButton: document.getElementById("playButton"),
      nextButton: document.getElementById("nextButton"),
      zoomOutButton: document.getElementById("zoomOutButton"),
      zoomResetButton: document.getElementById("zoomResetButton"),
      zoomInButton: document.getElementById("zoomInButton"),
      overlayButton: document.getElementById("overlayButton"),
      infoButton: document.getElementById("infoButton"),
      contrastSlider: document.getElementById("contrastSlider"),
      brightnessSlider: document.getElementById("brightnessSlider"),
      speedSlider: document.getElementById("speedSlider"),
      contrastLabel: document.getElementById("contrastLabel"),
      brightnessLabel: document.getElementById("brightnessLabel"),
      speedLabel: document.getElementById("speedLabel"),
      contourNames: document.getElementById("contourNames"),
      fundusViewTitle: document.getElementById("fundusViewTitle"),
      fundusViewHint: document.getElementById("fundusViewHint"),
      bscanViewTitle: document.getElementById("bscanViewTitle"),
      bscanViewHint: document.getElementById("bscanViewHint"),
      fundusCanvas: document.getElementById("fundusCanvas"),
      octCanvas: document.getElementById("octCanvas"),
      projectionImage: document.getElementById("projectionImage"),
      fundusImage: document.getElementById("fundusImage"),
      fundusEmptyState: document.getElementById("fundusEmptyState"),
      emptyState: document.getElementById("emptyState"),
      fundusStage: document.getElementById("fundusStage"),
      stage: document.getElementById("stage"),
    };

    const ctx = elements.octCanvas.getContext("2d");
    const fundusCtx = elements.fundusCanvas.getContext("2d");

    function getUiState() {
      try {
        return { ...DEFAULT_UI_STATE, ...(JSON.parse(localStorage.getItem(STORAGE_KEYS.uiState)) || {}) };
      } catch {
        return { ...DEFAULT_UI_STATE };
      }
    }

    function saveUiState() {
      const persisted = getUiState();
      const currentPath = elements.pathInput.value.trim();
      const payload = {
        contrast: Number(elements.contrastSlider.value),
        brightness: Number(elements.brightnessSlider.value),
        speed: Number(elements.speedSlider.value),
        bscanZoom: Number(state.bscanZoom),
        overlay: state.overlay,
        showInfo: state.showInfo,
        lastPath: currentPath || persisted.lastPath || "",
      };
      localStorage.setItem(STORAGE_KEYS.uiState, JSON.stringify(payload));
    }

    function loadRecentFiles() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEYS.recentFiles)) || [];
        return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
      } catch {
        return [];
      }
    }

    function renderRecentFiles() {
      const recentFiles = loadRecentFiles();
      elements.recentSelect.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = recentFiles.length ? "选择最近文件" : "暂无历史记录";
      elements.recentSelect.appendChild(placeholder);
      recentFiles.forEach((filepath) => {
        const option = document.createElement("option");
        option.value = filepath;
        option.textContent = filepath;
        elements.recentSelect.appendChild(option);
      });
    }

    function saveRecentFile(path) {
      if (!path) return;
      const recentFiles = loadRecentFiles().filter((item) => item !== path);
      recentFiles.unshift(path);
      localStorage.setItem(STORAGE_KEYS.recentFiles, JSON.stringify(recentFiles.slice(0, 8)));
      renderRecentFiles();
    }

    function setBusy(isBusy, message = "") {
      state.busy = isBusy;
      [
        elements.pathInput,
        elements.browseButton,
        elements.loadButton,
        elements.refreshButton,
        elements.resetViewButton,
        elements.recentSelect,
      ].forEach((element) => {
        if (element) {
          element.disabled = isBusy;
        }
      });
      if (message) {
        setStatus(message);
      }
    }

    function setStatus(message, isError = false) {
      elements.status.textContent = message;
      elements.status.classList.toggle("error", Boolean(isError));
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, { cache: "no-store", ...options });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "请求失败");
      }
      return payload;
    }

    function waitMs(duration) {
      return new Promise((resolve) => window.setTimeout(resolve, duration));
    }

    function invalidateViewerCaches() {
      state.fundusViewCacheKey = "";
      state.fundusViewCacheCanvas = null;
      state.contourCache.clear();
    }

    function clampBscanZoom(value) {
      return Math.min(4, Math.max(0.25, Number(value) || 1));
    }

    function setBscanZoom(value, { persist = true } = {}) {
      state.bscanZoom = clampBscanZoom(value);
      updateLabels();
      fitCanvasDisplays();
      if (persist) {
        saveUiState();
      }
    }

    function currentVolume() {
      if (!state.data || !state.data.volumes.length) return null;
      return state.data.volumes[state.volumeIndex] || null;
    }

    function currentFundus() {
      if (!state.data || !state.data.fundusImages.length) return null;
      return state.data.fundusImages[state.fundusIndex] || null;
    }

    function resetPlayback() {
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      state.playbackGeneration += 1;
      state.playing = false;
      elements.playButton.textContent = "播放";
    }

    function updateLabels() {
      const volume = currentVolume();
      const sliceCount = volume ? volume.sliceCount : 0;
      elements.sliceLabel.textContent = `Slice ${state.sliceIndex + (sliceCount ? 1 : 0)} / ${sliceCount}`;
      elements.contrastLabel.textContent = `${elements.contrastSlider.value}%`;
      elements.brightnessLabel.textContent = `${elements.brightnessSlider.value}`;
      elements.speedLabel.textContent = `${elements.speedSlider.value} FPS`;
      if (elements.zoomResetButton) {
        elements.zoomResetButton.textContent = `${Math.round(state.bscanZoom * 100)}%`;
      }
      elements.overlayButton.textContent = state.overlay ? "轮廓开" : "轮廓关";
      elements.infoButton.textContent = state.showInfo ? "提示开" : "提示关";
      elements.contourNames.textContent = volume && volume.contourNames.length
        ? volume.contourNames.join(", ")
        : "无";
    }

    function renderSelectors() {
      const volumes = state.data?.volumes || [];
      const fundusImages = state.data?.fundusImages || [];

      elements.volumeSelect.innerHTML = volumes.length
        ? volumes.map((item, index) => `<option value="${index}">${item.label}</option>`).join("")
        : `<option value="0">无 Volume</option>`;

      elements.fundusSelect.innerHTML = fundusImages.length
        ? fundusImages.map((item, index) => `<option value="${index}">${item.label}</option>`).join("")
        : `<option value="0">无 Fundus</option>`;

      elements.volumeSelect.value = String(Math.min(state.volumeIndex, Math.max(0, volumes.length - 1)));
      elements.fundusSelect.value = String(Math.min(state.fundusIndex, Math.max(0, fundusImages.length - 1)));
    }

    function updateViewInfo() {
      const volume = currentVolume();
      const hintDisplay = state.showInfo ? "" : "none";
      elements.fundusViewHint.style.display = hintDisplay;
      elements.bscanViewHint.style.display = hintDisplay;
      if (!volume) {
        elements.fundusViewTitle.textContent = "定位图 / Fundus";
        elements.fundusViewHint.textContent = "左侧显示定位图，点击定位线可跳转到对应切片。";
        elements.bscanViewTitle.textContent = "当前 B-Scan";
        elements.bscanViewHint.textContent = "右侧显示与左侧定位线匹配的当前切片。";
        return;
      }

      const sliceNumber = state.sliceIndex + 1;
      const segmentCount = Array.isArray(volume.overlaySegments) ? volume.overlaySegments.length : 0;
      const displayMode = getOverlayDisplayMode(volume);
      const currentSegment = Array.isArray(volume.overlaySegments) ? volume.overlaySegments[state.sliceIndex] : null;
      const directionLabel = getSegmentDirectionLabel(currentSegment);

      elements.fundusViewTitle.textContent = volume.matchedFundusLabel || "定位图 / Fundus";

      if (volume.overlayWarning) {
        elements.fundusViewHint.textContent = volume.overlayWarning;
      } else if (displayMode === "box") {
        elements.fundusViewHint.textContent = `当前显示方框扫描区域，红框对应 B-scan 第 ${sliceNumber} / ${volume.sliceCount} 张。`;
      } else if (displayMode === "radial") {
        elements.fundusViewHint.textContent = `当前显示放射状扫描定位，第 ${sliceNumber} / ${volume.sliceCount} 张。`;
      } else if (displayMode === "single-line") {
        elements.fundusViewHint.textContent = `当前为${directionLabel}扫描线，对应当前 B-scan。`;
      } else if (volume.overlayMode === "e2e-metadata") {
        elements.fundusViewHint.textContent = `定位线已与 B-scan 元数据匹配，当前为第 ${sliceNumber} / ${volume.sliceCount} 张。`;
      } else {
        elements.fundusViewHint.textContent = `当前定位线：第 ${sliceNumber} / ${Math.max(segmentCount, volume.sliceCount)} 张，点击左图可快速切换。`;
      }

      elements.bscanViewTitle.textContent = volume.label || "当前 B-Scan";
      elements.bscanViewHint.textContent = displayMode === "box"
        ? `当前方框区域对应的 B-scan：${sliceNumber} / ${volume.sliceCount}`
        : `Slice ${sliceNumber} / ${volume.sliceCount}`;
    }

    function getSegmentDirectionLabel(segment) {
      const angle = Math.abs(Number(segment?.angleDegrees ?? 0)) % 180;
      if (angle <= 15 || angle >= 165) return "水平";
      if (Math.abs(angle - 90) <= 15) return "垂直";
      return "斜向";
    }

    function getOverlayDisplayMode(volume) {
      const projectionMode = String(volume?.projectionMode || "");
      if (projectionMode.endsWith("-rect") || projectionMode.includes("square-raster")) {
        return "box";
      }
      if (projectionMode.endsWith("-line")) {
        return "single-line";
      }

      const segments = Array.isArray(volume?.overlaySegments) ? volume.overlaySegments : [];
      if (segments.length < 2) {
        return "single-line";
      }

      const angles = segments
        .map((segment) => Math.abs(Number(segment?.angleDegrees ?? 0)) % 180)
        .filter((value) => Number.isFinite(value));
      if (!angles.length) {
        return "single-line";
      }

      const angleSpread = Math.max(...angles) - Math.min(...angles);
      if (angleSpread > 25) {
        return "radial";
      }
      return "multi-line";
    }

    function renderState() {
      const loaded = Boolean(state.data?.loaded);
      const volume = currentVolume();
      const fundus = currentFundus();

      elements.readerValue.textContent = loaded ? state.data.reader : "-";
      elements.pathValue.textContent = loaded ? state.data.sourcePath : "-";
      elements.volumeCountValue.textContent = String(state.data?.volumes?.length || 0);
      elements.fundusCountValue.textContent = String(state.data?.fundusImages?.length || 0);
      elements.volumeBadge.textContent = volume ? `${volume.width} × ${volume.height} · ${volume.sliceCount} slices` : "未加载";
      elements.sliceSlider.disabled = !volume;
      elements.prevButton.disabled = !volume;
      elements.nextButton.disabled = !volume;
      elements.playButton.disabled = !volume;
      elements.zoomOutButton.disabled = !volume;
      elements.zoomResetButton.disabled = !volume;
      elements.zoomInButton.disabled = !volume;
      elements.overlayButton.disabled = !volume;
      elements.infoButton.disabled = !volume;
      elements.sliceSlider.max = volume ? String(Math.max(0, volume.sliceCount - 1)) : "0";
      elements.sliceSlider.value = volume ? String(Math.min(state.sliceIndex, volume.sliceCount - 1)) : "0";
      elements.emptyState.style.display = volume ? "none" : "block";
      renderSelectors();
      updateLabels();

      if (volume) {
        elements.projectionImage.src = `/api/volume/${state.volumeIndex}/projection.png?ts=${Date.now()}`;
      } else {
        elements.projectionImage.removeAttribute("src");
      }

      if (fundus) {
        elements.fundusImage.src = `/api/fundus/${state.fundusIndex}.png?ts=${Date.now()}`;
      } else {
        elements.fundusImage.removeAttribute("src");
      }
    }

    function buildSliceUrl() {
      return `/api/volume/${state.volumeIndex}/slice/${state.sliceIndex}.png?contrast=${elements.contrastSlider.value}&brightness=${elements.brightnessSlider.value}`;
    }

    function fitCanvasDisplay() {
      const volume = currentVolume();
      const width = state.canvasNaturalWidth || 1024;
      const height = state.canvasNaturalHeight || 512;
      const logicalWidth = volume?.displayWidthUnits || width;
      const logicalHeight = volume?.displayHeightUnits || height;
      const stageRect = elements.stage.getBoundingClientRect();
      const maxWidth = Math.max(120, stageRect.width - 24);
      const maxHeight = Math.max(180, stageRect.height - 24);
      const scale = Math.min(maxWidth / logicalWidth, maxHeight / logicalHeight);
      elements.octCanvas.style.width = `${Math.max(1, Math.round(logicalWidth * scale))}px`;
      elements.octCanvas.style.height = `${Math.max(1, Math.round(logicalHeight * scale))}px`;
    }

    function applyMatchedFundus() {
      const volume = currentVolume();
      if (!volume) return;
      if (typeof volume.matchedFundusIndex === "number" && volume.matchedFundusIndex >= 0) {
        state.fundusIndex = volume.matchedFundusIndex;
      }
    }

    async function drawCurrentSlice() {
      const volume = currentVolume();
      if (!volume) {
        ctx.clearRect(0, 0, elements.octCanvas.width, elements.octCanvas.height);
        return;
      }

      const token = ++state.renderToken;
      const response = await fetch(`${buildSliceUrl()}&ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          const payload = await response.json();
          throw new Error(payload.error || "切片图像加载失败");
        }
        throw new Error(`切片图像加载失败：HTTP ${response.status}`);
      }

      const blob = await response.blob();
      let drawable = null;
      let naturalWidth = volume.width;
      let naturalHeight = volume.height;
      let cleanup = null;

      if (window.createImageBitmap) {
        drawable = await createImageBitmap(blob);
        naturalWidth = drawable.width || naturalWidth;
        naturalHeight = drawable.height || naturalHeight;
      } else {
        const imageUrl = URL.createObjectURL(blob);
        const image = new Image();
        image.decoding = "async";
        image.src = imageUrl;
        await new Promise((resolve, reject) => {
          image.onload = resolve;
          image.onerror = () => reject(new Error("切片图像加载失败"));
        });
        drawable = image;
        naturalWidth = image.naturalWidth || naturalWidth;
        naturalHeight = image.naturalHeight || naturalHeight;
        cleanup = () => URL.revokeObjectURL(imageUrl);
      }

      if (token !== state.renderToken) return;

      state.canvasNaturalWidth = naturalWidth;
      state.canvasNaturalHeight = naturalHeight;
      elements.octCanvas.width = state.canvasNaturalWidth;
      elements.octCanvas.height = state.canvasNaturalHeight;
      fitCanvasDisplay();
      ctx.clearRect(0, 0, elements.octCanvas.width, elements.octCanvas.height);
      ctx.drawImage(drawable, 0, 0, elements.octCanvas.width, elements.octCanvas.height);
      if (drawable && typeof drawable.close === "function") {
        drawable.close();
      }
      if (cleanup) {
        cleanup();
      }

      if (state.overlay && volume.contourNames.length) {
        try {
          const contourPayload = await fetchJson(`/api/volume/${state.volumeIndex}/contours/${state.sliceIndex}.json`);
          if (token !== state.renderToken) return;
          drawContours(contourPayload.contours || {}, elements.octCanvas.width, elements.octCanvas.height);
        } catch (error) {
          console.warn(error);
        }
      }
    }

    function getDefaultBscanCrop() {
      return {
        left: 0,
        top: 0,
        width: state.canvasNaturalWidth || 1024,
        height: state.canvasNaturalHeight || 512,
        originalWidth: state.canvasNaturalWidth || 1024,
        originalHeight: state.canvasNaturalHeight || 512,
      };
    }

    function computeBscanCrop(drawable, width, height) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = width;
      tempCanvas.height = height;
      const tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true });
      if (!tempCtx) {
        return { left: 0, top: 0, width, height, originalWidth: width, originalHeight: height };
      }

      tempCtx.drawImage(drawable, 0, 0, width, height);
      const imageData = tempCtx.getImageData(0, 0, width, height).data;
      const rowCounts = new Uint32Array(height);
      const colCounts = new Uint32Array(width);
      const threshold = 14;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const offset = ((y * width) + x) * 4;
          const value = Math.max(imageData[offset], imageData[offset + 1], imageData[offset + 2]);
          if (value > threshold) {
            rowCounts[y] += 1;
            colCounts[x] += 1;
          }
        }
      }

      const rowThreshold = Math.max(3, Math.round(width * 0.015));
      const colThreshold = Math.max(3, Math.round(height * 0.02));

      let top = 0;
      while (top < height && rowCounts[top] < rowThreshold) top += 1;
      let bottom = height - 1;
      while (bottom > top && rowCounts[bottom] < rowThreshold) bottom -= 1;
      let left = 0;
      while (left < width && colCounts[left] < colThreshold) left += 1;
      let right = width - 1;
      while (right > left && colCounts[right] < colThreshold) right -= 1;

      if (left >= right || top >= bottom) {
        return { left: 0, top: 0, width, height, originalWidth: width, originalHeight: height };
      }

      const padX = Math.max(6, Math.round((right - left + 1) * 0.03));
      const padY = Math.max(10, Math.round((bottom - top + 1) * 0.08));
      left = Math.max(0, left - padX);
      right = Math.min(width - 1, right + padX);
      top = Math.max(0, top - padY);
      bottom = Math.min(height - 1, bottom + padY);

      const cropWidth = right - left + 1;
      const cropHeight = bottom - top + 1;
      if (cropWidth < width * 0.2 || cropHeight < height * 0.15) {
        return { left: 0, top: 0, width, height, originalWidth: width, originalHeight: height };
      }

      return {
        left,
        top,
        width: cropWidth,
        height: cropHeight,
        originalWidth: width,
        originalHeight: height,
      };
    }

    function drawContours(contours, width, height) {
      const colors = ["#38bdf8", "#22c55e", "#f97316", "#f43f5e", "#a78bfa", "#facc15"];
      const crop = state.bscanCrop || getDefaultBscanCrop();
      const targetWidth = elements.octCanvas.width;
      const targetHeight = elements.octCanvas.height;
      const names = Object.keys(contours);
      names.forEach((name, index) => {
        const values = contours[name];
        if (!values || !values.length) return;
        ctx.beginPath();
        ctx.lineWidth = 2;
        ctx.strokeStyle = colors[index % colors.length];
        let started = false;
        values.forEach((yValue, xIndex) => {
          if (yValue == null || Number.isNaN(yValue)) {
            started = false;
            return;
          }
          const sourceX = (xIndex / Math.max(values.length - 1, 1)) * Math.max(width - 1, 1);
          const sourceY = Number(yValue);
          if (
            sourceX < crop.left
            || sourceX > (crop.left + crop.width - 1)
            || sourceY < crop.top
            || sourceY > (crop.top + crop.height - 1)
          ) {
            started = false;
            return;
          }
          const x = ((sourceX - crop.left) / Math.max(crop.width - 1, 1)) * Math.max(targetWidth - 1, 1);
          const y = ((sourceY - crop.top) / Math.max(crop.height - 1, 1)) * Math.max(targetHeight - 1, 1);
          if (!started) {
            ctx.moveTo(x, y);
            started = true;
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
      });
    }

    let renderDebounce = null;
    function scheduleDraw() {
      if (renderDebounce) window.clearTimeout(renderDebounce);
      renderDebounce = window.setTimeout(() => {
        drawCurrentSlice().catch((error) => setStatus(error.message, true));
      }, 80);
    }

    function renderSelectors() {
      const volumes = state.data?.volumes || [];
      const volume = currentVolume();

      elements.volumeSelect.innerHTML = volumes.length
        ? volumes.map((item, index) => `<option value="${index}">${item.label}</option>`).join("")
        : `<option value="0">No Volume</option>`;

      const matchedLabel = volume?.matchedFundusLabel || "Auto matched / Projection";
      elements.fundusSelect.innerHTML = `<option value="${Math.max(0, state.fundusIndex)}">${matchedLabel}</option>`;

      elements.volumeSelect.value = String(Math.min(state.volumeIndex, Math.max(0, volumes.length - 1)));
      elements.fundusSelect.value = String(Math.max(0, state.fundusIndex));
      elements.fundusSelect.disabled = true;
    }


    function renderState() {
      const loaded = Boolean(state.data?.loaded);
      const volume = currentVolume();

      elements.readerValue.textContent = loaded ? state.data.reader : "-";
      elements.pathValue.textContent = loaded ? state.data.sourcePath : "-";
      elements.volumeCountValue.textContent = String(state.data?.volumes?.length || 0);
      elements.fundusCountValue.textContent = String(state.data?.fundusImages?.length || 0);
      elements.volumeBadge.textContent = volume ? `${volume.width} × ${volume.height} · ${volume.sliceCount} slices` : "未加载";
      elements.sliceSlider.disabled = !volume;
      elements.prevButton.disabled = !volume;
      elements.nextButton.disabled = !volume;
      elements.playButton.disabled = !volume;
      elements.zoomOutButton.disabled = !volume;
      elements.zoomResetButton.disabled = !volume;
      elements.zoomInButton.disabled = !volume;
      elements.overlayButton.disabled = !volume;
      elements.sliceSlider.max = volume ? String(Math.max(0, volume.sliceCount - 1)) : "0";
      elements.sliceSlider.value = volume ? String(Math.min(state.sliceIndex, volume.sliceCount - 1)) : "0";
      elements.fundusEmptyState.style.display = volume ? "none" : "block";
      elements.emptyState.style.display = volume ? "none" : "block";
      renderSelectors();
      updateLabels();
      updateViewInfo();
      fitCanvasDisplays();
    }

    function fitCanvasToStage({ canvas, stage, logicalWidth, logicalHeight, minWidth = 120, minHeight = 180, zoomFactor = 1 }) {
      const safeLogicalWidth = Math.max(1, logicalWidth || canvas.width || 1);
      const safeLogicalHeight = Math.max(1, logicalHeight || canvas.height || 1);
      const stageRect = stage.getBoundingClientRect();
      const stageStyle = window.getComputedStyle(stage);
      const padX = (parseFloat(stageStyle.paddingLeft) || 0) + (parseFloat(stageStyle.paddingRight) || 0);
      const padY = (parseFloat(stageStyle.paddingTop) || 0) + (parseFloat(stageStyle.paddingBottom) || 0);
      const maxWidth = Math.max(minWidth, stageRect.width - padX);
      const maxHeight = Math.max(minHeight, stageRect.height - padY);
      const scale = Math.min(maxWidth / safeLogicalWidth, maxHeight / safeLogicalHeight) * Math.max(0.01, zoomFactor || 1);
      canvas.style.width = `${Math.max(1, Math.round(safeLogicalWidth * scale))}px`;
      canvas.style.height = `${Math.max(1, Math.round(safeLogicalHeight * scale))}px`;
    }

    function fitCanvasDisplays() {
      const volume = currentVolume();
      const crop = state.bscanCrop || {
        left: 0,
        top: 0,
        width: state.canvasNaturalWidth || 1024,
        height: state.canvasNaturalHeight || 512,
        originalWidth: state.canvasNaturalWidth || 1024,
        originalHeight: state.canvasNaturalHeight || 512,
      };
      const widthScale = (volume?.displayWidthUnits || crop.originalWidth || 1) / Math.max(crop.originalWidth || 1, 1);
      const heightScale = (volume?.displayHeightUnits || crop.originalHeight || 1) / Math.max(crop.originalHeight || 1, 1);
      fitCanvasToStage({
        canvas: elements.octCanvas,
        stage: elements.stage,
        logicalWidth: crop.width * widthScale,
        logicalHeight: crop.height * heightScale,
        zoomFactor: state.bscanZoom,
      });
      fitCanvasToStage({
        canvas: elements.fundusCanvas,
        stage: elements.fundusStage,
        logicalWidth: state.fundusNaturalWidth || 1024,
        logicalHeight: state.fundusNaturalHeight || 1024,
        minWidth: 180,
        minHeight: 180,
      });
    }

    function fitCanvasDisplay() {
      fitCanvasDisplays();
    }

    async function loadDrawable(url, fallbackWidth, fallbackHeight, errorPrefix) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          const payload = await response.json();
          throw new Error(payload.error || errorPrefix);
        }
        throw new Error(`${errorPrefix}：HTTP ${response.status}`);
      }

      const blob = await response.blob();
      if (window.createImageBitmap) {
        const bitmap = await createImageBitmap(blob);
        return {
          drawable: bitmap,
          naturalWidth: bitmap.width || fallbackWidth,
          naturalHeight: bitmap.height || fallbackHeight,
          cleanup: () => bitmap.close(),
        };
      }

      const imageUrl = URL.createObjectURL(blob);
      const image = new Image();
      image.decoding = "async";
      image.src = imageUrl;
      await new Promise((resolve, reject) => {
        image.onload = resolve;
        image.onerror = () => reject(new Error(errorPrefix));
      });
      return {
        drawable: image,
        naturalWidth: image.naturalWidth || fallbackWidth,
        naturalHeight: image.naturalHeight || fallbackHeight,
        cleanup: () => URL.revokeObjectURL(imageUrl),
      };
    }

    function drawSegment(ctx2d, segment, options = {}) {
      const start = segment?.start;
      const end = segment?.end;
      if (!Array.isArray(start) || !Array.isArray(end) || start.length < 2 || end.length < 2) {
        return;
      }

      const lineWidth = options.lineWidth || 1.5;
      ctx2d.save();
      ctx2d.beginPath();
      ctx2d.lineWidth = lineWidth;
      ctx2d.strokeStyle = options.strokeStyle || "rgba(56, 189, 248, 0.24)";
      if (options.dash) {
        ctx2d.setLineDash(options.dash);
      }
      ctx2d.moveTo(Number(start[0]), Number(start[1]));
      ctx2d.lineTo(Number(end[0]), Number(end[1]));
      ctx2d.stroke();

      if (options.showEndpoints) {
        const radius = Math.max(2, lineWidth * 1.3);
        ctx2d.fillStyle = options.endpointColor || options.strokeStyle || "#f87171";
        ctx2d.beginPath();
        ctx2d.arc(Number(start[0]), Number(start[1]), radius, 0, Math.PI * 2);
        ctx2d.arc(Number(end[0]), Number(end[1]), radius, 0, Math.PI * 2);
        ctx2d.fill();
      }
      ctx2d.restore();
    }

    function drawFundusOverlay(volume) {
      const segments = Array.isArray(volume?.overlaySegments) ? volume.overlaySegments : [];
      if (!segments.length) return;

      const segmentCount = Math.min(volume?.sliceCount || segments.length, segments.length);
      const activeIndex = Math.max(0, Math.min(state.sliceIndex, Math.max(0, segmentCount - 1)));
      const baseLineWidth = Math.max(1.25, Math.min(elements.fundusCanvas.width, elements.fundusCanvas.height) / 480);
      const displayMode = getOverlayDisplayMode(volume);
      const activeSegment = segments[activeIndex];
      if (!activeSegment) return;

      if (displayMode === "box" && Array.isArray(volume?.overlayBounds) && volume.overlayBounds.length === 4) {
        const [left, top, boxWidth, boxHeight] = volume.overlayBounds.map((value) => Number(value));
        fundusCtx.save();
        fundusCtx.strokeStyle = "rgba(56, 189, 248, 0.95)";
        fundusCtx.lineWidth = baseLineWidth * 1.4;
        fundusCtx.strokeRect(left, top, boxWidth, boxHeight);
        fundusCtx.restore();
      } else if (displayMode === "radial" || displayMode === "multi-line") {
        for (let index = 0; index < segmentCount; index += 1) {
          drawSegment(fundusCtx, segments[index], {
            lineWidth: baseLineWidth,
            strokeStyle: index === activeIndex ? "rgba(248, 113, 113, 0.98)" : "rgba(56, 189, 248, 0.42)",
          });
        }
      }

      if (displayMode === "single-line") {
        drawSegment(fundusCtx, activeSegment, {
          lineWidth: baseLineWidth * 1.25,
          strokeStyle: "rgba(56, 189, 248, 0.4)",
        });
      }

      drawSegment(fundusCtx, activeSegment, {
        lineWidth: baseLineWidth * 1.9,
        strokeStyle: "rgba(248, 113, 113, 0.98)",
        showEndpoints: true,
        endpointColor: "#fde68a",
      });

      const labelX = (Number(activeSegment.start[0]) + Number(activeSegment.end[0])) / 2;
      const labelY = (Number(activeSegment.start[1]) + Number(activeSegment.end[1])) / 2;
      fundusCtx.save();
      fundusCtx.font = `${Math.max(12, Math.round(baseLineWidth * 7))}px "Segoe UI", sans-serif`;
      fundusCtx.fillStyle = "#f8fafc";
      fundusCtx.strokeStyle = "rgba(2, 6, 23, 0.75)";
      fundusCtx.lineWidth = 3;
      fundusCtx.strokeText(`B${activeIndex + 1}`, labelX + 10, labelY - 10);
      fundusCtx.fillText(`B${activeIndex + 1}`, labelX + 10, labelY - 10);
      fundusCtx.restore();
    }

    function pointToCanvas(event, canvas) {
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      const x = ((event.clientX - rect.left) / rect.width) * canvas.width;
      const y = ((event.clientY - rect.top) / rect.height) * canvas.height;
      if (x < 0 || y < 0 || x > canvas.width || y > canvas.height) {
        return null;
      }
      return [x, y];
    }

    function distanceToSegment(point, segment) {
      const start = segment?.start;
      const end = segment?.end;
      if (!Array.isArray(start) || !Array.isArray(end) || start.length < 2 || end.length < 2) {
        return Number.POSITIVE_INFINITY;
      }

      const px = Number(point[0]);
      const py = Number(point[1]);
      const x1 = Number(start[0]);
      const y1 = Number(start[1]);
      const x2 = Number(end[0]);
      const y2 = Number(end[1]);
      const dx = x2 - x1;
      const dy = y2 - y1;
      if (!dx && !dy) {
        return Math.hypot(px - x1, py - y1);
      }

      const t = Math.max(0, Math.min(1, (((px - x1) * dx) + ((py - y1) * dy)) / ((dx * dx) + (dy * dy))));
      const nearestX = x1 + (dx * t);
      const nearestY = y1 + (dy * t);
      return Math.hypot(px - nearestX, py - nearestY);
    }

    function selectSliceFromFundus(event) {
      const volume = currentVolume();
      if (!volume) return;
      const point = pointToCanvas(event, elements.fundusCanvas);
      if (!point) return;

      const segments = Array.isArray(volume.overlaySegments) ? volume.overlaySegments : [];
      const segmentCount = Math.min(volume.sliceCount || segments.length, segments.length);
      if (!segmentCount) return;

      let bestIndex = -1;
      let bestDistance = Number.POSITIVE_INFINITY;
      for (let index = 0; index < segmentCount; index += 1) {
        const distance = distanceToSegment(point, segments[index]);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      }

      if (bestIndex < 0 || bestIndex === state.sliceIndex) return;
      state.sliceIndex = bestIndex;
      elements.sliceSlider.value = String(state.sliceIndex);
      updateLabels();
      updateViewInfo();
      scheduleDraw();
    }

    async function drawFundusView(token = state.renderToken) {
      const volume = currentVolume();
      if (!volume) {
        fundusCtx.clearRect(0, 0, elements.fundusCanvas.width, elements.fundusCanvas.height);
        return;
      }

      const cacheKey = `${state.data?.sourcePath || ""}::${state.volumeIndex}`;
      if (!state.fundusViewCacheCanvas || state.fundusViewCacheKey !== cacheKey) {
        let drawablePayload = null;
        try {
          drawablePayload = await loadDrawable(
            `/api/volume/${state.volumeIndex}/fundus-view.png?ts=${Date.now()}`,
            state.fundusNaturalWidth || 1024,
            state.fundusNaturalHeight || 1024,
            "切片图像加载失败",
          );
          if (token !== state.renderToken) return;

          state.fundusNaturalWidth = drawablePayload.naturalWidth;
          state.fundusNaturalHeight = drawablePayload.naturalHeight;

          const cacheCanvas = document.createElement("canvas");
          cacheCanvas.width = state.fundusNaturalWidth;
          cacheCanvas.height = state.fundusNaturalHeight;
          const cacheCtx = cacheCanvas.getContext("2d");
          if (!cacheCtx) {
            throw new Error("Fundus cache canvas initialization failed.");
          }
          cacheCtx.drawImage(drawablePayload.drawable, 0, 0, cacheCanvas.width, cacheCanvas.height);
          state.fundusViewCacheCanvas = cacheCanvas;
          state.fundusViewCacheKey = cacheKey;
        } finally {
          drawablePayload?.cleanup?.();
        }
      }

      if (!state.fundusViewCacheCanvas) {
        return;
      }

      const fundusSizeChanged = (
        elements.fundusCanvas.width !== state.fundusNaturalWidth
        || elements.fundusCanvas.height !== state.fundusNaturalHeight
      );
      if (fundusSizeChanged) {
        elements.fundusCanvas.width = state.fundusNaturalWidth;
        elements.fundusCanvas.height = state.fundusNaturalHeight;
        fitCanvasDisplays();
      }

      fundusCtx.clearRect(0, 0, elements.fundusCanvas.width, elements.fundusCanvas.height);
      fundusCtx.drawImage(state.fundusViewCacheCanvas, 0, 0, elements.fundusCanvas.width, elements.fundusCanvas.height);
      drawFundusOverlay(volume);
    }

    async function drawCurrentSlice(token = ++state.renderToken) {
      const volume = currentVolume();
      if (!volume) {
        state.bscanCrop = null;
        ctx.clearRect(0, 0, elements.octCanvas.width, elements.octCanvas.height);
        return;
      }

      let drawablePayload = null;
      try {
        drawablePayload = await loadDrawable(
          `${buildSliceUrl()}&ts=${Date.now()}`,
          volume.width,
          volume.height,
          "切片图像加载失败",
        );
        if (token !== state.renderToken) return;

        state.canvasNaturalWidth = drawablePayload.naturalWidth;
        state.canvasNaturalHeight = drawablePayload.naturalHeight;
        state.bscanCrop = null;
        const bscanSizeChanged = (
          elements.octCanvas.width !== state.canvasNaturalWidth
          || elements.octCanvas.height !== state.canvasNaturalHeight
        );
        if (bscanSizeChanged) {
          elements.octCanvas.width = state.canvasNaturalWidth;
          elements.octCanvas.height = state.canvasNaturalHeight;
          fitCanvasDisplays();
        }
        ctx.clearRect(0, 0, elements.octCanvas.width, elements.octCanvas.height);
        ctx.drawImage(drawablePayload.drawable, 0, 0, elements.octCanvas.width, elements.octCanvas.height);
      } finally {
        drawablePayload?.cleanup?.();
      }

      if (state.overlay && volume.contourNames.length) {
        try {
          const contourCacheKey = `${state.data?.sourcePath || ""}::${state.volumeIndex}::${state.sliceIndex}`;
          let contourPayload = state.contourCache.get(contourCacheKey);
          if (!contourPayload) {
            contourPayload = await fetchJson(`/api/volume/${state.volumeIndex}/contours/${state.sliceIndex}.json`);
            state.contourCache.set(contourCacheKey, contourPayload);
          }
          if (token !== state.renderToken) return;
          drawContours(contourPayload.contours || {}, elements.octCanvas.width, elements.octCanvas.height);
        } catch (error) {
          console.warn(error);
        }
      }
    }

    async function drawViewer() {
      const token = ++state.renderToken;
      updateViewInfo();
      await Promise.all([
        drawFundusView(token),
        drawCurrentSlice(token),
      ]);
    }

    function scheduleDraw() {
      if (renderDebounce) window.clearTimeout(renderDebounce);
      renderDebounce = window.setTimeout(() => {
        drawViewer().catch((error) => setStatus(error.message, true));
      }, 80);
    }

    async function refreshState() {
      state.data = await fetchJson("/api/state");
      invalidateViewerCaches();
      if (state.data.loaded) {
        const maxVolume = Math.max(0, state.data.volumes.length - 1);
        const maxFundus = Math.max(0, state.data.fundusImages.length - 1);
        state.volumeIndex = Math.min(state.volumeIndex, maxVolume);
        state.fundusIndex = Math.min(state.fundusIndex, maxFundus);
        const volume = currentVolume();
        state.sliceIndex = volume ? Math.min(state.sliceIndex, volume.sliceCount - 1) : 0;
        applyMatchedFundus();
      } else {
        state.volumeIndex = 0;
        state.fundusIndex = 0;
        state.sliceIndex = 0;
      }
      renderState();
      scheduleDraw();
    }

    function applyLoadedPayload(payload, options = {}) {
      state.data = payload;
      state.volumeIndex = 0;
      state.fundusIndex = 0;
      state.sliceIndex = 0;
      invalidateViewerCaches();
      applyMatchedFundus();
      resetPlayback();

      const sourceKind = payload?.sourceKind || "path";
      const recentPath = payload?.recentPath || "";
      if (sourceKind === "path") {
        elements.pathInput.value = recentPath || options.fallbackPath || payload.sourcePath || "";
        if (elements.pathInput.value.trim()) {
          saveRecentFile(elements.pathInput.value.trim());
        }
      } else {
        elements.pathInput.value = "";
      }

      saveUiState();
      renderState();
      scheduleDraw();
      setStatus(`已加载：${payload.sourcePath}`);
    }

    async function loadPath() {
      const filepath = elements.pathInput.value.trim();
      if (!filepath) {
        setStatus("请先输入一个 OCT 文件路径。", true);
        return;
      }
      setBusy(true, "正在读取 OCT 文件，请稍候...");
      try {
        const payload = await fetchJson(`/api/load?path=${encodeURIComponent(filepath)}`);
        applyLoadedPayload(payload, { fallbackPath: filepath });
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    }

    async function uploadSelectedFile(file) {
      if (!file) {
        return;
      }

      const formData = new FormData();
      formData.append("file", file, file.name);
      setBusy(true, `正在上传文件：${file.name}`);
      try {
        const payload = await fetchJson("/api/upload", {
          method: "POST",
          body: formData,
        });
        applyLoadedPayload(payload);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        elements.fileInput.value = "";
        setBusy(false);
      }
    }

    function advanceSlice(delta, shouldSchedule = true) {
      const volume = currentVolume();
      if (!volume) return;
      const sliceCount = volume.sliceCount;
      state.sliceIndex = (state.sliceIndex + delta + sliceCount) % sliceCount;
      elements.sliceSlider.value = String(state.sliceIndex);
      updateLabels();
      if (shouldSchedule) {
        scheduleDraw();
      }
    }

    function stepSlice(delta) {
      advanceSlice(delta, true);
    }

    async function runPlaybackLoop(generation) {
      while (state.playing && generation === state.playbackGeneration) {
        const startedAt = performance.now();
        advanceSlice(1, false);
        try {
          await drawViewer();
        } catch (error) {
          setStatus(error.message, true);
          resetPlayback();
          return;
        }
        const targetInterval = Math.max(80, Math.round(1000 / Number(elements.speedSlider.value)));
        const remainingDelay = Math.max(0, targetInterval - (performance.now() - startedAt));
        if (remainingDelay > 0) {
          await waitMs(remainingDelay);
        }
      }
    }

    function togglePlay() {
      const volume = currentVolume();
      if (!volume) return;
      if (state.playing) {
        resetPlayback();
        return;
      }
      state.playing = true;
      elements.playButton.textContent = "暂停";
      state.playbackGeneration += 1;
      const generation = state.playbackGeneration;
      runPlaybackLoop(generation);
    }

    function resetViewControls() {
      elements.contrastSlider.value = "100";
      elements.brightnessSlider.value = "0";
      elements.speedSlider.value = "5";
      state.bscanZoom = 1;
      fitCanvasDisplays();
      state.overlay = true;
      state.showInfo = true;
      updateLabels();
      updateViewInfo();
      saveUiState();
      scheduleDraw();
    }

    function applyPersistedUiState() {
      const persisted = getUiState();
      elements.contrastSlider.value = String(persisted.contrast ?? DEFAULT_UI_STATE.contrast);
      elements.brightnessSlider.value = String(persisted.brightness ?? DEFAULT_UI_STATE.brightness);
      elements.speedSlider.value = String(persisted.speed ?? DEFAULT_UI_STATE.speed);
      state.bscanZoom = clampBscanZoom(persisted.bscanZoom ?? DEFAULT_UI_STATE.bscanZoom);
      state.overlay = Boolean(persisted.overlay ?? DEFAULT_UI_STATE.overlay);
      state.showInfo = Boolean(persisted.showInfo ?? DEFAULT_UI_STATE.showInfo);
      if (!elements.pathInput.value) {
        elements.pathInput.value = persisted.lastPath || "";
      }
      updateLabels();
      updateViewInfo();
    }

    elements.browseButton.addEventListener("click", () => {
      elements.fileInput.click();
    });
    elements.fileInput.addEventListener("change", () => {
      const [file] = elements.fileInput.files || [];
      uploadSelectedFile(file);
    });
    elements.loadButton.addEventListener("click", loadPath);
    elements.refreshButton.addEventListener("click", () => {
      setBusy(true, "正在刷新状态...");
      refreshState()
        .then(() => setStatus("状态已刷新。"))
        .catch((error) => setStatus(error.message, true))
        .finally(() => setBusy(false));
    });
    elements.resetViewButton.addEventListener("click", resetViewControls);
    elements.recentSelect.addEventListener("change", () => {
      if (!elements.recentSelect.value) return;
      elements.pathInput.value = elements.recentSelect.value;
      saveUiState();
    });
    elements.volumeSelect.addEventListener("change", () => {
      state.volumeIndex = Number(elements.volumeSelect.value);
      state.fundusIndex = 0;
      state.sliceIndex = 0;
      invalidateViewerCaches();
      applyMatchedFundus();
      renderState();
      scheduleDraw();
    });
    elements.fundusSelect.addEventListener("change", () => {
      state.fundusIndex = Number(elements.fundusSelect.value);
      renderState();
    });
    elements.sliceSlider.addEventListener("input", () => {
      state.sliceIndex = Number(elements.sliceSlider.value);
      updateLabels();
      scheduleDraw();
    });
    elements.prevButton.addEventListener("click", () => stepSlice(-1));
    elements.nextButton.addEventListener("click", () => stepSlice(1));
    elements.playButton.addEventListener("click", togglePlay);
    elements.zoomOutButton.addEventListener("click", () => setBscanZoom(state.bscanZoom / 1.2));
    elements.zoomResetButton.addEventListener("click", () => setBscanZoom(1));
    elements.zoomInButton.addEventListener("click", () => setBscanZoom(state.bscanZoom * 1.2));
    elements.overlayButton.addEventListener("click", () => {
      state.overlay = !state.overlay;
      updateLabels();
      saveUiState();
      scheduleDraw();
    });
    elements.infoButton.addEventListener("click", () => {
      state.showInfo = !state.showInfo;
      updateLabels();
      updateViewInfo();
      saveUiState();
    });
    elements.contrastSlider.addEventListener("input", () => {
      updateLabels();
      saveUiState();
      scheduleDraw();
    });
    elements.brightnessSlider.addEventListener("input", () => {
      updateLabels();
      saveUiState();
      scheduleDraw();
    });
    elements.speedSlider.addEventListener("input", () => {
      updateLabels();
      saveUiState();
      if (state.playing) {
        resetPlayback();
        togglePlay();
      }
    });
    elements.pathInput.addEventListener("input", saveUiState);
    elements.pathInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadPath();
    });
    elements.stage.addEventListener("wheel", (event) => {
      if (!currentVolume()) return;
      event.preventDefault();
      if (event.ctrlKey) {
        const zoomFactor = event.deltaY > 0 ? (1 / 1.1) : 1.1;
        setBscanZoom(state.bscanZoom * zoomFactor);
        return;
      }
      stepSlice(event.deltaY > 0 ? 1 : -1);
    }, { passive: false });
    elements.stage.addEventListener("dblclick", () => {
      if (!currentVolume()) return;
      setBscanZoom(1);
    });
    elements.fundusStage.addEventListener("click", selectSliceFromFundus);
    elements.fundusStage.addEventListener("wheel", (event) => {
      if (!currentVolume()) return;
      event.preventDefault();
      stepSlice(event.deltaY > 0 ? 1 : -1);
    }, { passive: false });
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") stepSlice(-1);
      if (event.key === "ArrowRight") stepSlice(1);
      if (event.key === " ") {
        event.preventDefault();
        togglePlay();
      }
    });
    window.addEventListener("resize", fitCanvasDisplay);

    renderRecentFiles();
    applyPersistedUiState();
    refreshState()
      .then(() => {
        if (state.data?.loaded) {
          elements.pathInput.value = state.data.sourcePath || "";
          saveRecentFile(elements.pathInput.value.trim());
          setStatus(`已加载：${state.data.sourcePath}`);
        } else {
          setStatus("等待加载 OCT 文件。");
        }
      })
      .catch((error) => setStatus(error.message, true));
  </script>
</body>
</html>
